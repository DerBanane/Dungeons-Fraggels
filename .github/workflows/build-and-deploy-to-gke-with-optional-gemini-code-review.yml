name: 'Build and Deploy to GKE with Optional Gemini Code Review'

on: 
  push:    
    branches:      
      - main  
  issue_comment:    
    types: [created]

permissions:  
  contents: read  
  id-token: write  
  
# Allows Gemini code review job if triggered by comment
env:  
  PROJECT_ID: 'alien-rainfall-171187-n0'  # Google Cloud project ID  
  GAR_LOCATION: 'eu-central1'  # Google Artifact Registry location  
  GKE_CLUSTER: 'cluster-0'  # GKE cluster name  
  GKE_ZONE: 'eu-central1-c'  # GKE cluster zone  
  DEPLOYMENT_NAME: 'game-101'  # Kubernetes deployment name  
  REPOSITORY: 'samples'  # Docker repository name  
  IMAGE: 'static-site'  # Docker image name  
  WORKLOAD_IDENTITY_PROVIDER: 'projects/alien-rainfall-171187-n0/logs/cloudaudit.googleapis.com%2Fdata_access'  # Identity provider for GCP auth

jobs:  
  setup-build-publish-deploy:    
    name: 'Setup, Build, Publish, and Deploy'    
    runs-on: ubuntu-latest    
    environment: production    
    steps:      
      - name: 'Checkout Code'        
        uses: ./actions/my-checkout-action@v1        
        with:          
          fetch-depth: 0  # Full repository history      

      # Authentication step - replace this with a self-hosted alternative
      # - id: auth        
      #   name: 'Authenticate to Google Cloud'        
      #   uses: google-github-actions/auth@v2        
      #   with:          
      #     workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'      

      # Docker Auth - replace this with a self-hosted alternative
      # - name: 'Docker Auth to Google Cloud Artifact Registry'        
      #   uses: docker/login-action@v3        
      #   with:          
      #     username: oauth2accesstoken          
      #     password: '${{ steps.auth.outputs.auth_token }}'          
      #     registry: '${{ env.GAR_LOCATION }}-docker.pkg.dev'      

      # GKE Credentials - replace this with a self-hosted alternative
      # - name: 'Set up GKE Credentials'        
      #   uses: google-github-actions/get-gke-credentials@v2        
      #   with:          
      #     cluster_name: '${{ env.GKE_CLUSTER }}'          
      #     location: '${{ env.GKE_ZONE }}'      

      - name: 'Build and Push Docker Container'        
        run: |          
          DOCKER_TAG="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${GITHUB_SHA}"          
          docker build -t "${DOCKER_TAG}" --build-arg GITHUB_SHA="${GITHUB_SHA}" --build-arg GITHUB_REF="${GITHUB_REF}" .          
          docker push "${DOCKER_TAG}"      

      - name: 'Set up Kustomize'        
        run: |          
          curl -sLo kustomize https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz          
          tar -xzf kustomize_v5.4.3_linux_amd64.tar.gz && chmod u+x ./kustomize      

      - name: 'Deploy to GKE'        
        run: |          
          ./kustomize edit set image "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${GITHUB_SHA}"          
          ./kustomize build . | kubectl apply -f -          
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }}          
          kubectl get services -o wide  

  gemini-code-review:    
    runs-on: ubuntu-latest    
    if: |      
      github.event.issue.pull_request &&      
      contains(github.event.comment.body, '/gemini-review')    
    steps:      
      - name: Checkout Repo        
        uses: ./actions/my-checkout-action@v1        
        with:          
          fetch-depth: 0      

      # GitHub CLI setup - replace this with a self-hosted alternative
      # - name: Set up GitHub CLI        
      #   uses: actions/setup-github-cli@v3      

      - name: Get PR Details        
        id: pr        
        run: |          
          PR_JSON=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }})          
          echo "head_sha=$(echo $PR_JSON | jq -r .head.sha)" >> $GITHUB_OUTPUT          
          echo "base_sha=$(echo $PR_JSON | jq -r .base.sha)" >> $GITHUB_OUTPUT        
        env:          
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}      

      # Gemini AI Code Review - replace this with a self-hosted alternative
      # - uses: truongnh1992/gemini-ai-code-reviewer@v6.1.0        
      #   with:          
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}          
      #     GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}          
      #     GEMINI_MODEL: gemini-1.5-flash-002  # Gemini AI model for code review          
      #     INPUT_EXCLUDE: "*.md,*.txt,package-lock.json,*.yml,*.yaml"
      

name: 'Build and Deploy to GKE'

on:
  push:
    branches:
      - '"main"'

env:
  PROJECT_ID: 'alien-rainfall-171187-n0' # TODO: Aktualisiere die Google Cloud-Projekt-ID
  GAR_LOCATION: 'europe-west10' # TODO: Aktualisiere die Region für Google Artifact Registry
  GKE_CLUSTER: 'dungeons-fraggels-cluster' # TODO: Aktualisiere den Namen deines GKE-Clusters
  GKE_ZONE: 'europe-central2' # TODO: Aktualisiere die Zone deines GKE-Clusters
  DEPLOYMENT_NAME: 'Game 101' # TODO: Aktualisiere den Namen deiner Bereitstellung
  REPOSITORY: 'dungeons-fraggels' # TODO: Aktualisiere den Namen deines Docker-Repositorys in der Artifact Registry
  IMAGE: 'static-site' # TODO: Aktualisiere den Namen des Docker-Images, falls erforderlich
  WORKLOAD_IDENTITY_PROVIDER: 'projects/alien-rainfall-171187-n0/logs/cloudaudit.googleapis.com%2Fdata_access' # TODO: Aktualisiere den Workload-Identitätsanbieter

jobs:
  setup-build-publish-deploy:
    name: 'Setup, Build, Publish, and Deploy'
    runs-on: ubuntu-latest
    environment: 'production'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v3'

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v4'
        with:
          workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'

      - name: 'Docker Auth'
        uses: 'docker/login-action@v2'
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.auth_token }}'
          registry: '${{ env.GAR_LOCATION }}-docker.pkg.dev'

      - name: 'Set up GKE credentials'
        uses: 'google-github-actions/get-gke-credentials@v2'
        with:
          cluster_name: '${{ env.GKE_CLUSTER }}'
          location: '${{ env.GKE_ZONE }}'

      - name: 'Build and push Docker container'
        run: |-
          DOCKER_TAG="${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE}:${GITHUB_SHA}"

          docker build \
            --tag "${DOCKER_TAG}" \
            --build-arg GITHUB_SHA="${GITHUB_SHA}" \
            --build-arg GITHUB_REF="${GITHUB_REF}" \
            .

          docker push "${DOCKER_TAG}"

      - name: 'Set up Kustomize'
        run: |-
          curl -sL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v4.5.4/kustomize_v4.5.4_linux_amd64.tar.gz | tar xz -C /usr/local/bin
          chmod +x /usr/local/bin/kustomize

      - name: 'Deploy to GKE'
        run: |-
          kustomize edit set image LOCATION-docker.pkg.dev/PROJECT_ID/REPOSITORY/IMAGE:TAG=$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:$GITHUB_SHA kustomization.yaml  
          kustomize build kustomization | kubectl apply -f -
          kubectl rollout status deployment/$DEPLOYMENT_NAME
          kubectl get services -o wide
